<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Sign in — Local AI Workspace</title>
    <style>
        :root { color-scheme: dark; --bg:#0b1020; --surface:#151d2f; --border:#2b3953; --text:#f4f7fb; --muted:#9eabc0; --accent:#fbbf24; --danger:#fca5a5; }
        * { box-sizing: border-box; }
        body { margin:0; min-height:100dvh; display:grid; place-items:center; padding:24px max(16px, env(safe-area-inset-right)) max(24px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left)); font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif; color:var(--text); background:radial-gradient(circle at top left,#17203a 0,var(--bg) 48%); }
        main { width:min(100%,420px); padding:26px; background:rgba(21,29,47,.96); border:1px solid var(--border); border-radius:18px; box-shadow:0 24px 70px rgba(0,0,0,.3); }
        h1 { color:var(--accent); margin:0 0 6px; font-size:27px; }
        p { color:var(--muted); margin:0 0 22px; line-height:1.45; }
        label { display:block; margin:0 0 7px; font-weight:700; }
        input { width:100%; margin:0 0 16px; padding:13px; border:1px solid var(--border); border-radius:11px; background:#0b1221; color:var(--text); font:inherit; font-size:16px; }
        input:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(251,191,36,.12); }
        button { width:100%; padding:12px 16px; border:0; border-radius:11px; background:var(--accent); color:#111827; font:inherit; font-weight:800; cursor:pointer; }
        button:disabled { opacity:.55; cursor:wait; }
        #message { min-height:22px; margin:14px 0 0; color:var(--danger); font-size:14px; }
        .setup { padding:12px; border:1px solid #7c5b19; border-radius:10px; background:#29220e; color:#fde68a; overflow-wrap:anywhere; }
        code { font-size:12px; }
    </style>
</head>
<body>
    <main>
        <h1>Local AI Workspace</h1>
        <p>Sign in to your local AI workspace.</p>
        <form id="loginForm">
            <label for="username">Username</label>
            <input id="username" name="username" autocomplete="username" autocapitalize="none" required>
            <label for="password">Password</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required>
            <button id="loginButton" type="submit">Sign in</button>
        </form>
        <div id="message" role="alert" aria-live="polite"></div>
    </main>
    <script>
        const form = document.getElementById("loginForm");
        const button = document.getElementById("loginButton");
        const message = document.getElementById("message");

        async function checkStatus() {
            try {
                const response = await fetch("/auth/status", {cache:"no-store"});
                const data = await response.json();
                if (data.authenticated) { location.replace("/ui"); return; }
                if (!data.configured) {
                    form.hidden = true;
                    message.className = "setup";
                    message.innerHTML = "Create a local user before signing in:<br><code>cd C:\\Sade\\Sade-v1<br>.\\.venv\\Scripts\\python.exe -m app.auth create-user jani</code>";
                }
            } catch (error) {
                message.textContent = "The local server is not reachable.";
            }
        }

        form.addEventListener("submit", async event => {
            event.preventDefault();
            button.disabled = true;
            message.textContent = "Signing in…";
            try {
                const response = await fetch("/auth/login", {
                    method:"POST",
                    headers:{"Content-Type":"application/json"},
                    body:JSON.stringify({username:form.username.value.trim(), password:form.password.value})
                });
                const data = await response.json();
                if (response.ok && data.ok) { location.replace("/ui"); return; }
                message.textContent = data.message || data.detail || "Sign-in failed.";
                form.password.value = "";
                form.password.focus();
            } catch (error) {
                message.textContent = "The local server is not reachable.";
            } finally {
                button.disabled = false;
            }
        });
        checkStatus();
    </script>
</body>
</html>
